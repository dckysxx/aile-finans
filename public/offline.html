<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Çevrimdışı · Aile Finans</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin:0; min-height:100dvh; display:grid; place-items:center;
    background:#0b0d12; color:#e5e7eb;
    font-family:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;
    padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom);
  }
  .card { text-align:center; max-width:320px; }
  .logo {
    width:64px;height:64px;border-radius:20px;margin:0 auto 20px;
    display:grid;place-items:center;
    background:linear-gradient(135deg,#6366f1,#8b5cf6 55%,#d65cc8);
    font-size:30px;
  }
  h1 { font-size:18px; margin:0 0 8px; }
  p { font-size:14px; color:#9ca3af; margin:0 0 20px; line-height:1.5; }
  button {
    height:44px;padding:0 20px;border:0;border-radius:12px;color:#fff;font-size:14px;font-weight:600;
    background:linear-gradient(135deg,#6366f1,#8b5cf6);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">✦</div>
    <h1>İnternet bağlantısı yok</h1>
    <p>Aile Finans'a erişmek için çevrimiçi olman gerekiyor. Bağlantını kontrol edip tekrar dene.</p>
    <button onclick="location.reload()">Tekrar dene</button>
  </div>
</body>
</html>
